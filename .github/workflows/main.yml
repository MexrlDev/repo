name: Build DEB from MCPE IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Extract IPA
      run: |
        mkdir work
        unzip "apps/MCPE 0.10.0.ipa" -d work

    - name: Prepare package structure
      run: |
        mkdir -p pkg/Applications
        cp -r work/Payload/*.app pkg/Applications/

        mkdir -p pkg/DEBIAN

        echo "Package: com.mcpe.app" > pkg/DEBIAN/control
        echo "Name: MCPE" >> pkg/DEBIAN/control
        echo "Version: 0.10.0" >> pkg/DEBIAN/control
        echo "Architecture: iphoneos-arm" >> pkg/DEBIAN/control
        echo "Description: Minecraft PE 0.10.0" >> pkg/DEBIAN/control
        echo "Maintainer: you" >> pkg/DEBIAN/control
        echo "Section: Applications" >> pkg/DEBIAN/control

    - name: Add postinst (uicache)
      run: |
        echo "#!/bin/bash" > pkg/DEBIAN/postinst
        echo "uicache" >> pkg/DEBIAN/postinst
        chmod 755 pkg/DEBIAN/postinst

    - name: Fix permissions
      run: |
        chmod -R 755 pkg
        chmod 644 pkg/DEBIAN/control

    - name: Build deb
      run: |
        dpkg-deb -b pkg mcpe.deb

    - name: Upload deb
      uses: actions/upload-artifact@v3
      with:
        name: mcpe-deb
        path: mcpe.deb
