name: Build DEB from IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract IPA
        run: |
          mkdir -p work
          unzip "apps/MCPE 0.10.0.ipa" -d work

      - name: Prepare package structure
        run: |
          mkdir -p pkg/Applications
          cp -r work/Payload/*.app pkg/Applications/

          mkdir -p pkg/DEBIAN
          cat > pkg/DEBIAN/control <<'EOF'
          Package: com.mcpe.app
          Name: MCPE
          Version: 0.10.0
          Architecture: iphoneos-arm
          Description: Minecraft PE 0.10.0
          Maintainer: you
          Section: Applications
          EOF

      - name: Add postinst
        run: |
          cat > pkg/DEBIAN/postinst <<'EOF'
          #!/bin/bash
          uicache
          EOF
          chmod 755 pkg/DEBIAN/postinst

      - name: Fix permissions
        run: |
          chmod -R 755 pkg
          chmod 644 pkg/DEBIAN/control

      - name: Build deb
        run: dpkg-deb -b pkg mcpe.deb

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: mcpe-deb
          path: mcpe.deb
