name: Build Cydia Repo

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install repo tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev gzip

      - name: Prepare repo folders
        run: |
          mkdir -p repo/debs
          if [ -d debs ]; then cp -r debs/* repo/debs/ 2>/dev/null || true; fi
          if [ -f CydiaIcon.png ]; then cp CydiaIcon.png repo/; fi
          if [ -f Release ]; then cp Release repo/; fi

      - name: Generate Packages
        run: |
          dpkg-scanpackages repo/debs /dev/null > repo/Packages
          gzip -kf repo/Packages

      - name: Upload repo artifact
        uses: actions/upload-artifact@v4
        with:
          name: cydia-repo
          path: repo
